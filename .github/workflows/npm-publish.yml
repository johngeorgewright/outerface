name: Publish

on:
  release:
    types: [published]

concurrency:
  group: npm-publish

jobs:
  publish-test:
    uses: ./.github/workflows/test.yml

  publish-npm:
    name: NPM
    needs: [publish-test]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
